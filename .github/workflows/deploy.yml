name: Build & Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy-live:
    name: Deploy to LIVE
    runs-on: [self-hosted, live]
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Pull latest code & Deploy LIVE
        run: |
          cd /home/deploy/student-assessment-cms
          git pull origin main
          docker compose up -d --build
          docker exec student-assessment-cms php artisan migrate --force
          docker exec student-assessment-cms php artisan config:cache
          docker exec student-assessment-cms php artisan route:cache
          docker exec student-assessment-cms php artisan view:cache
          docker exec student-assessment-cms php artisan storage:link
