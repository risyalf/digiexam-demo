services:
  app-1:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: student-assessment-cms-1
    restart: always
    ports:
      - "9495:8000"
    env_file:
      - .env
    volumes:
      - ./storage:/app/storage
      - ./logs:/app/logs
    command: php artisan octane:frankenphp --workers=2
    depends_on:
      - mysql
      - redis

  app-2:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: student-assessment-cms-2
    restart: always
    ports:
      - "9496:8000"
    env_file:
      - .env
    volumes:
      - ./storage:/app/storage
      - ./logs:/app/logs
    command: php artisan octane:frankenphp --workers=2
    depends_on:
      - mysql
      - redis

  queue:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: student-assessment-cms-queue
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./storage:/app/storage
      - ./logs:/app/logs
    command: php artisan queue:work --sleep=3 --tries=3 --timeout=90
    depends_on:
      - mysql
      - redis

  mysql:
    image: mysql:8.0.45-bookworm
    container_name: student-assessment-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: student_assessment
      MYSQL_USER: student
      MYSQL_PASSWORD: secret
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql/my.cnf:/etc/mysql/conf.d/my.cnf

  redis:
    image: redis:8.6.0-alpine
    container_name: student-assessment-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data

volumes:
  mysql-data:
  redis-data:
